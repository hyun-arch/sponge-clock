<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sponge Clock</title>
  <meta name="theme-color" content="#06070d" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icons/icon192.png" />
  <link rel="stylesheet" href="timer.css" />
</head>
<body data-state="idle" data-mode="countdown">
  <!-- Ambient color glow that shifts with the active time zone -->
  <div class="ambient" aria-hidden="true"></div>

  <main class="stage">
    <!-- ===== Top bar: mode switch + clock ===== -->
    <header class="topbar">
      <div class="brand">
        <span class="brand-dot"></span>
        <span class="brand-name">Sponge&nbsp;Clock</span>
      </div>

      <div class="mode-switch" role="tablist" aria-label="모드 선택">
        <button class="mode-btn is-active" data-mode="countdown" role="tab">카운트다운</button>
        <button class="mode-btn" data-mode="stopwatch" role="tab">스톱워치</button>
        <span class="mode-thumb" aria-hidden="true"></span>
      </div>

      <div class="wallclock" id="wallclock" aria-label="현재 시각">--:--</div>
    </header>

    <!-- ===== The ring + giant time ===== -->
    <section class="dial">
      <svg class="ring" viewBox="0 0 360 360" aria-hidden="true">
        <defs>
          <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%"  stop-color="var(--ring-a)" />
            <stop offset="100%" stop-color="var(--ring-b)" />
          </linearGradient>
          <filter id="ringGlow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="6" result="b" />
            <feMerge>
              <feMergeNode in="b" />
              <feMergeNode in="SourceGraphic" />
            </feMerge>
          </filter>
        </defs>
        <circle class="ring-track" cx="180" cy="180" r="160" />
        <circle class="ring-progress" cx="180" cy="180" r="160"
                stroke="url(#ringGrad)" filter="url(#ringGlow)" />
      </svg>

      <div class="readout">
        <div class="seg-banner" id="segBanner" hidden></div>
        <div class="time" id="time" role="timer" aria-live="off">05:00</div>
        <div class="sublabel" id="sublabel">시작하려면 Space</div>
      </div>
    </section>

    <!-- ===== Preset chips ===== -->
    <section class="presets" id="presets" aria-label="빠른 시간 설정">
      <button class="chip" data-min="1">1분</button>
      <button class="chip" data-min="3">3분</button>
      <button class="chip is-active" data-min="5">5분</button>
      <button class="chip" data-min="10">10분</button>
      <button class="chip" data-min="15">15분</button>
      <button class="chip" data-min="20">20분</button>
      <button class="chip" data-min="30">30분</button>
      <button class="chip" data-min="45">45분</button>
      <button class="chip" data-min="60">60분</button>
      <button class="chip chip-custom" id="customChip">직접 입력</button>
    </section>

    <!-- ===== Control bar ===== -->
    <footer class="controls">
      <button class="ctrl ctrl-ghost" id="resetBtn" title="리셋 (R)" aria-label="리셋">
        <svg viewBox="0 0 24 24" class="ico"><path d="M12 5V2L7 6l5 4V7a5 5 0 1 1-5 5H5a7 7 0 1 0 7-7z"/></svg>
      </button>

      <button class="ctrl ctrl-primary" id="playBtn" title="시작 / 정지 (Space)" aria-label="시작">
        <svg viewBox="0 0 24 24" class="ico ico-play"><path d="M8 5v14l11-7z"/></svg>
        <svg viewBox="0 0 24 24" class="ico ico-pause"><path d="M7 5h4v14H7zm6 0h4v14h-4z"/></svg>
      </button>

      <button class="ctrl ctrl-ghost" id="addBtn" title="1분 추가 (+)" aria-label="1분 추가">
        <span class="add-text">+1:00</span>
      </button>

      <button class="ctrl ctrl-ghost" id="skipBtn" title="다음 구간 (N)" aria-label="다음 구간" hidden>
        <svg viewBox="0 0 24 24" class="ico"><path d="M6 5l9 7-9 7V5zm10 0h2v14h-2z"/></svg>
      </button>

      <div class="ctrl-spacer"></div>

      <button class="ctrl ctrl-ghost" id="pinBtn" title="항상 위로 미니 (P)" aria-label="항상 위로">
        <svg viewBox="0 0 24 24" class="ico"><path d="M16 3l5 5-4 1-3 3 1 5-2 2-4-4-5 5-1-1 5-5-4-4 2-2 5 1 3-3 1-4z"/></svg>
      </button>

      <button class="ctrl ctrl-ghost" id="soundBtn" title="소리 켜기/끄기 (M)" aria-label="소리">
        <svg viewBox="0 0 24 24" class="ico ico-sound-on"><path d="M5 9v6h4l5 5V4L9 9H5zm11.5 3a4.5 4.5 0 0 0-2.5-4v8a4.5 4.5 0 0 0 2.5-4z"/></svg>
        <svg viewBox="0 0 24 24" class="ico ico-sound-off"><path d="M5 9v6h4l5 5V4L9 9H5z"/><path d="M19 5L5 19" stroke-width="2" stroke="currentColor" fill="none"/></svg>
      </button>

      <button class="ctrl ctrl-ghost" id="fsBtn" title="전체화면 (F)" aria-label="전체화면">
        <svg viewBox="0 0 24 24" class="ico"><path d="M4 9V4h5M20 9V4h-5M4 15v5h5M20 15v5h-5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>

      <button class="ctrl ctrl-ghost" id="settingsBtn" title="설정 (S)" aria-label="설정">
        <svg viewBox="0 0 24 24" class="ico"><path d="M12 8a4 4 0 1 0 0 8 4 4 0 0 0 0-8zm8.4 4l1.5 1.2-1.5 2.6-1.9-.6a6.9 6.9 0 0 1-1.4.8l-.4 2H11l-.4-2a6.9 6.9 0 0 1-1.4-.8l-1.9.6L5.8 14l1.5-1.2a6.6 6.6 0 0 1 0-1.6L5.8 10l1.5-2.6 1.9.6c.4-.3.9-.6 1.4-.8l.4-2h2.2l.4 2c.5.2 1 .5 1.4.8l1.9-.6L21.9 10l-1.5 1.2a6.6 6.6 0 0 1 0 1.6z"/></svg>
      </button>
    </footer>
  </main>

  <!-- Overrun flash overlay -->
  <div class="overrun" id="overrun" aria-hidden="true"></div>

  <!-- Present-mode overlay (one click → fullscreen, satisfies the gesture requirement) -->
  <div class="present-overlay" id="presentOverlay" hidden>
    <button class="present-go" id="presentGo">
      <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      전체화면 발표 시작
    </button>
    <p>또는 아무 곳이나 클릭 · 단축키 F</p>
  </div>

  <!-- ===== Custom time / target / agenda dialog ===== -->
  <div class="modal" id="customModal" aria-hidden="true">
    <div class="modal-card wide" role="dialog" aria-label="시간 설정">
      <div class="tabs" id="customTabs">
        <button class="tab is-active" data-tab="time">시간</button>
        <button class="tab" data-tab="target">종료 시각</button>
        <button class="tab" data-tab="agenda">어젠다</button>
      </div>

      <!-- 시간 직접 입력 -->
      <div class="tabpane" data-pane="time">
        <div class="time-input">
          <input id="inMin" type="number" min="0" max="999" inputmode="numeric" value="5" />
          <span class="colon">:</span>
          <input id="inSec" type="number" min="0" max="59" inputmode="numeric" value="00" />
        </div>
        <div class="time-input-labels"><span>분</span><span>초</span></div>
      </div>

      <!-- 종료 시각 -->
      <div class="tabpane" data-pane="target" hidden>
        <p class="pane-hint">이 시각이 되면 0이 됩니다. (지났으면 내일 기준)</p>
        <div class="time-input">
          <input id="tgtH" type="number" min="0" max="23" inputmode="numeric" value="15" />
          <span class="colon">:</span>
          <input id="tgtM" type="number" min="0" max="59" inputmode="numeric" value="00" />
        </div>
        <div class="time-input-labels"><span>시</span><span>분</span></div>
      </div>

      <!-- 어젠다 (다구간) -->
      <div class="tabpane" data-pane="agenda" hidden>
        <p class="pane-hint">구간을 이어 실행하고 사이마다 자동 전환·알림합니다.</p>
        <div class="agenda-list" id="agendaList"></div>
        <button class="agenda-add" id="agendaAdd">＋ 구간 추가</button>
        <div class="agenda-presets">
          <button data-preset="talk">발표 20 + Q&amp;A 5</button>
          <button data-preset="lightning">라이트닝 5×3</button>
          <button data-preset="workshop">워크숍 10·25·10</button>
        </div>
      </div>

      <div class="modal-actions">
        <button class="m-btn m-ghost" id="customCancel">취소</button>
        <button class="m-btn m-primary" id="customApply">설정</button>
      </div>
    </div>
  </div>

  <!-- ===== Settings dialog ===== -->
  <div class="modal" id="settingsModal" aria-hidden="true">
    <div class="modal-card settings-card" role="dialog" aria-label="설정">
      <h2 class="modal-title">설정</h2>

      <div class="set-row">
        <span class="set-label">테마</span>
        <div class="seg" id="themeSeg">
          <button class="seg-btn" data-theme="dark">다크</button>
          <button class="seg-btn" data-theme="light">라이트</button>
        </div>
      </div>

      <div class="set-row">
        <span class="set-label">강조색</span>
        <div class="swatches" id="swatches">
          <button class="swatch" data-accent="blue" style="--sw:#0a84ff" aria-label="블루"></button>
          <button class="swatch" data-accent="purple" style="--sw:#7d3cff" aria-label="퍼플"></button>
          <button class="swatch" data-accent="green" style="--sw:#30d158" aria-label="그린"></button>
          <button class="swatch" data-accent="pink" style="--sw:#ff2d78" aria-label="핑크"></button>
          <button class="swatch" data-accent="graphite" style="--sw:#8a93a3" aria-label="그래파이트"></button>
        </div>
      </div>

      <div class="set-row">
        <span class="set-label">음성 안내</span>
        <button class="toggle" id="voiceToggle" role="switch" aria-checked="true"><span></span></button>
      </div>

      <div class="set-row">
        <span class="set-label">초과 시 화면 점멸</span>
        <button class="toggle" id="overrunToggle" role="switch" aria-checked="true"><span></span></button>
      </div>

      <div class="modal-actions">
        <button class="m-btn m-primary" id="settingsClose">완료</button>
      </div>
    </div>
  </div>

  <!-- Keyboard hint that fades out -->
  <div class="hint" id="hint">Space 시작 · R 리셋 · F 전체화면 · P 항상위 · S 설정 · + 1분추가</div>

  <script src="engine.js"></script>
  <script src="sound.js"></script>
  <script src="voice.js"></script>
  <script src="cues.js"></script>
  <script src="timer.js"></script>
</body>
</html>
