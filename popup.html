<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>Sponge Clock</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body data-mode="countdown" data-sound="on">
  <div class="glow" id="glow" aria-hidden="true"></div>

  <header class="pop-top">
    <div class="brand"><span class="dot" id="dot"></span><span>Sponge Clock</span></div>
    <span class="wall" id="wall">--:--</span>
  </header>

  <div class="mode-switch" role="tablist">
    <button class="mode-btn is-active" data-mode="countdown">카운트다운</button>
    <button class="mode-btn" data-mode="stopwatch">스톱워치</button>
    <span class="mode-thumb"></span>
  </div>

  <div class="readout">
    <div class="time" id="time">05:00</div>
    <div class="sub" id="sub">시작 준비됨</div>
  </div>

  <section class="presets" id="presets">
    <button class="chip" data-min="1">1</button>
    <button class="chip" data-min="3">3</button>
    <button class="chip is-active" data-min="5">5</button>
    <button class="chip" data-min="10">10</button>
    <button class="chip" data-min="15">15</button>
    <button class="chip" data-min="20">20</button>
    <button class="chip" data-min="30">30</button>
    <button class="chip" data-min="45">45</button>
    <button class="chip" data-min="60">60</button>
  </section>

  <div class="controls">
    <button class="ctrl ghost" id="resetBtn" aria-label="리셋" title="리셋">
      <svg viewBox="0 0 24 24"><path d="M12 5V2L7 6l5 4V7a5 5 0 1 1-5 5H5a7 7 0 1 0 7-7z"/></svg>
    </button>
    <button class="ctrl primary" id="playBtn" aria-label="시작">
      <svg viewBox="0 0 24 24" class="i-play"><path d="M8 5v14l11-7z"/></svg>
      <svg viewBox="0 0 24 24" class="i-pause"><path d="M7 5h4v14H7zm6 0h4v14h-4z"/></svg>
    </button>
    <button class="ctrl ghost" id="addBtn" aria-label="1분 추가" title="1분 추가"><span>+1:00</span></button>
  </div>

  <section class="launch">
    <button class="launch-btn" data-open="mini">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="3" fill="none" stroke="currentColor" stroke-width="2"/><rect x="12" y="12" width="7" height="6" rx="1.5"/></svg>
      <span>미니창</span><em>항상 위로</em>
    </button>
    <button class="launch-btn" data-open="full">
      <svg viewBox="0 0 24 24"><path d="M4 9V4h5M20 9V4h-5M4 15v5h5M20 15v5h-5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      <span>전체화면</span><em>발표 모드</em>
    </button>
    <button class="launch-btn" data-open="tab">
      <svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="2" fill="none" stroke="currentColor" stroke-width="2"/><path d="M3 9h18" stroke="currentColor" stroke-width="2"/></svg>
      <span>새 탭</span><em>크게 보기</em>
    </button>
  </section>

  <footer class="pop-foot">
    <div class="foot-row">
      <button class="foot-btn" id="soundBtn" aria-label="소리">
        <svg viewBox="0 0 24 24" class="i-on"><path d="M5 9v6h4l5 5V4L9 9H5zm11.5 3a4.5 4.5 0 0 0-2.5-4v8a4.5 4.5 0 0 0 2.5-4z"/></svg>
        <svg viewBox="0 0 24 24" class="i-off"><path d="M5 9v6h4l5 5V4L9 9H5z"/><path d="M19 5L5 19" stroke="currentColor" stroke-width="2"/></svg>
        <span id="soundLabel">소리 켜짐</span>
      </button>
    </div>
    <div class="foot-row">
      <span class="foot-text">음성 안내 (TTS)</span>
      <button class="toggle" id="voiceToggle" role="switch" aria-checked="true"><span></span></button>
    </div>
    <label class="auto">
      <input type="checkbox" id="autoMini" />
      <span>브라우저 시작 시 미니창 자동 실행</span>
    </label>
  </footer>

  <script src="engine.js"></script>
  <script src="sound.js"></script>
  <script src="voice.js"></script>
  <script src="popup.js"></script>
</body>
</html>
