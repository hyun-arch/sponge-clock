<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>Sponge Clock Mini</title>
  <link rel="stylesheet" href="mini.css" />
</head>
<body data-mode="countdown" data-running="0">
  <div id="mini-root">
    <div class="glow" id="glow" aria-hidden="true"></div>

    <div class="bar">
      <span class="brand"><span class="dot" id="dot"></span>Sponge</span>
      <div class="bar-actions">
        <button class="mini-ico" id="pinBtn" title="항상 위로 (다른 창 위에 고정)" aria-label="항상 위로">
          <svg viewBox="0 0 24 24"><path d="M16 3l5 5-4 1-3 3 1 5-2 2-4-4-5 5-1-1 5-5-4-4 2-2 5 1 3-3 1-4z"/></svg>
        </button>
        <button class="mini-ico" id="expandBtn" title="전체화면 발표" aria-label="전체화면">
          <svg viewBox="0 0 24 24"><path d="M4 9V4h5M20 9V4h-5M4 15v5h5M20 15v5h-5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
      </div>
    </div>

    <div class="dial">
      <svg class="ring" viewBox="0 0 200 200" aria-hidden="true">
        <circle class="track" cx="100" cy="100" r="88" />
        <circle class="prog" id="prog" cx="100" cy="100" r="88" />
      </svg>
      <div class="readout">
        <div class="time" id="time">05:00</div>
        <div class="sub" id="sub">시작 준비됨</div>
      </div>
    </div>

    <div class="controls">
      <button class="ctrl ghost" id="resetBtn" aria-label="리셋" title="리셋">
        <svg viewBox="0 0 24 24"><path d="M12 5V2L7 6l5 4V7a5 5 0 1 1-5 5H5a7 7 0 1 0 7-7z"/></svg>
      </button>
      <button class="ctrl primary" id="playBtn" aria-label="시작">
        <svg viewBox="0 0 24 24" class="i-play"><path d="M8 5v14l11-7z"/></svg>
        <svg viewBox="0 0 24 24" class="i-pause"><path d="M7 5h4v14H7zm6 0h4v14h-4z"/></svg>
      </button>
      <button class="ctrl ghost" id="addBtn" aria-label="1분 추가" title="1분 추가"><span>+1</span></button>
    </div>
  </div>

  <div id="pip-note" hidden>
    <svg viewBox="0 0 24 24" class="note-ico"><path d="M16 3l5 5-4 1-3 3 1 5-2 2-4-4-5 5-1-1 5-5-4-4 2-2 5 1 3-3 1-4z"/></svg>
    <p>미니 타이머가 <b>모든 창 위</b>에 떠 있습니다.</p>
    <button id="unpinBtn">항상 위 해제</button>
    <small>이 창을 닫으면 미니 타이머도 종료됩니다.</small>
  </div>

  <script src="engine.js"></script>
  <script src="sound.js"></script>
  <script src="voice.js"></script>
  <script src="cues.js"></script>
  <script src="mini.js"></script>
</body>
</html>
